name: Android CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build Debug APK
  # ─────────────────────────────────────────────
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Bootstrap the Gradle wrapper jar if it's missing (common in repos that
      # don't commit binary files). This step installs Gradle 8.6 and regenerates
      # the wrapper so that ./gradlew works correctly in all subsequent steps.
      - name: Bootstrap Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found — bootstrapping..."
            GRADLE_VERSION=8.6
            GRADLE_ZIP=gradle-${GRADLE_VERSION}-bin.zip
            curl -fsSL "https://services.gradle.org/distributions/${GRADLE_ZIP}" -o /tmp/${GRADLE_ZIP}
            unzip -q /tmp/${GRADLE_ZIP} -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper \
              --gradle-version=${GRADLE_VERSION} \
              --distribution-type=bin
            echo "Wrapper bootstrapped successfully"
          else
            echo "gradle-wrapper.jar already present"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Cache Gradle dependencies between runs for faster builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: noor-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 2: Lint Check
  # ─────────────────────────────────────────────
  lint:
    name: Lint Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build  # Only run if build succeeded

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Bootstrap Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            GRADLE_VERSION=8.6
            curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version=${GRADLE_VERSION} --distribution-type=bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 3: Release APK (only on main/master)
  # ─────────────────────────────────────────────
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [ build, lint ]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Bootstrap Gradle Wrapper
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            GRADLE_VERSION=8.6
            curl -fsSL "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip" -o /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
            /tmp/gradle-dist/gradle-${GRADLE_VERSION}/bin/gradle wrapper --gradle-version=${GRADLE_VERSION} --distribution-type=bin
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Sign with a debug keystore for now. 
      # For production: add KEYSTORE_FILE, KEY_ALIAS, KEY_PASSWORD, STORE_PASSWORD as GitHub Secrets.
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"

      # Optional: Sign with keystore if secrets are configured
      - name: Sign Release APK
        if: |
          secrets.KEYSTORE_BASE64 != '' &&
          secrets.KEY_ALIAS != '' &&
          secrets.KEY_PASSWORD != '' &&
          secrets.STORE_PASSWORD != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: noor-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # Create a GitHub Release on tag push
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
